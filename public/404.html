<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brian Bakaj, Actor</title>
    <!--
      GitHub Pages has no server-side SPA fallback, so a deep link like
      /BrianWebsite/about would 404. This stashes the requested path in a query
      string and redirects to the app root, where index.html restores it and the
      router renders the right page. pathSegmentsToKeep = 1 keeps the project base.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
            "/?/" +
            l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
