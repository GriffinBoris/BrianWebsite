name: Deploy static site to GitHub Pages

# Publishes the hand-authored static site (index.html + assets/) to GitHub Pages.
# One-time setup: in the repo, go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push to the default branch deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          # Skip Jekyll processing so files/underscore paths serve as-is.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
