<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Brian Bakaj — Actor</title>
    <meta
      name="description"
      content="Brian Bakaj is an Austin-based actor working on screen and in voiceover. Playing age 18–27, English and Albanian. See the work and hear the reels."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brian Bakaj — Actor" />
    <meta
      property="og:description"
      content="Austin-based actor for screen and voice. A natural, grounded presence that reads true on camera and on mic."
    />
    <meta property="og:image" content="https://griffinboris.github.io/BrianWebsite/og-image.jpg" />

    <!-- Prevent a flash of the wrong theme before the app mounts. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("brian.theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
